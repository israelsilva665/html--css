<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pseudo-Classes</title>
    <style>
    body{
    font-family: Arial, Helvetica, sans-serif;
    }
    div >p {
        display: none;
    }
    div:hover >p {
        display: block;
        color: antiquewhite;
        background-color: red;
        width:  120px;
    }
    div:hover {
    color: red 
    }   
    </style>
</head>
<body>
    <h1>Exemplo de HOVER</h1>
    <p>Pause o mouse sobre o texto abaixo.</p>
    <div>
        Passe o mouse aqui... coisa linda da minha vida 
    
        <p>EU TE AMO &#10084; &#65039; </p>
    </div>
</body>
</html>
